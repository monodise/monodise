<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F4E79">
  <meta name="description" content="Приложение для студентов АВПК">
  <title>Студенческий помощник АВПК</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1 id="page-title">Главная</h1>
    <button id="theme-btn" class="icon-btn" title="Переключить тему">🌙</button>
  </header>

  <main id="app">

    <section id="home" class="screen active">
      <div class="welcome-banner">
        <div class="welcome-emoji">🎓</div>
        <h2 id="welcome-title">Добро пожаловать!</h2>
        <p id="welcome-date" class="welcome-date"></p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stat-active-tasks">0</div>
          <div class="stat-label">Активных задач</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-done-tasks">0</div>
          <div class="stat-label">Выполнено</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-notes">0</div>
          <div class="stat-label">Заметок</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-grades">0</div>
          <div class="stat-label">Оценок</div>
        </div>
      </div>

      <div class="card">
        <button id="reset-btn" class="btn btn-danger btn-full">
          Сбросить все данные
        </button>
      </div>
    </section>

    <section id="tasks" class="screen">
      <form id="task-form" class="input-row">
        <input type="text" id="task-input" placeholder="Что нужно сделать?" autocomplete="off">
        <button type="submit" class="btn btn-icon">+</button>
      </form>

      <div id="task-stats" class="stat-line"></div>

      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="done">Выполненные</button>
      </div>

      <div id="task-list"></div>
    </section>

    <section id="notes" class="screen">
      <form id="note-form">
        <input type="text" id="note-title" placeholder="Заголовок заметки" autocomplete="off">
        <textarea id="note-content" placeholder="Текст заметки..." rows="4"></textarea>
        <button type="submit" class="btn btn-full">Сохранить заметку</button>
      </form>
      <div id="note-list" style="margin-top:20px;"></div>
    </section>

    <section id="grades" class="screen">
      <form id="grade-form">
        <input type="text" id="grade-subject" placeholder="Название предмета" autocomplete="off">
        <select id="grade-value">
          <option value="">Выберите оценку</option>
          <option value="5">5 — отлично</option>
          <option value="4">4 — хорошо</option>
          <option value="3">3 — удовлетворительно</option>
          <option value="2">2 — неудовлетворительно</option>
        </select>
        <button type="submit" class="btn btn-full">+ Добавить оценку</button>
      </form>
      <div id="grade-summary" style="margin-top:20px;"></div>
      <div id="grade-list" style="margin-top:12px;"></div>
    </section>

    <section id="schedule" class="screen">
      <div id="day-tabs" class="day-tabs"></div>

      <form id="lesson-form">
        <input type="time" id="lesson-time">
        <input type="text" id="lesson-subject" placeholder="Предмет" autocomplete="off">
        <input type="text" id="lesson-room" placeholder="Аудитория (необязательно)" autocomplete="off">
        <button type="submit" class="btn btn-full">+ Добавить пару</button>
      </form>

      <div id="lesson-list" style="margin-top:20px;"></div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button data-screen="home">🏠<span>Главная</span></button>
    <button data-screen="tasks">✓<span>Задачи</span></button>
    <button data-screen="notes">📝<span>Заметки</span></button>
    <button data-screen="grades">📊<span>Оценки</span></button>
    <button data-screen="schedule">📅<span>Расписание</span></button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
